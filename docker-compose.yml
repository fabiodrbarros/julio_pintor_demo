services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: julio-pintor:latest
    container_name: julio-pintor
    restart: unless-stopped
    ports:
      # host:container — o container ouve sempre na 3000 (interna do Next);
      # aqui publica-se na porta 5001 do host.
      - "5001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
